server.port: 9091
server:
  servlet:
    context-path: /employees
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/employeedbdetails
    username: postgres
    password: ROOT
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect